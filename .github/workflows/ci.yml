# ════════════════════════════════════════════════════════════════
#  HA Tools Hub — CI Workflow
#  Runs on every push and pull request to main.
#  Validates addon structure, config, and HTML page integrity.
# ════════════════════════════════════════════════════════════════

name: CI — Addon Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Addon Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Validate config.yaml ─────────────────────────────────
      - name: Validate config.yaml exists and has required fields
        run: |
          echo "Checking config.yaml..."
          if [ ! -f config.yaml ]; then
            echo "❌ config.yaml not found"
            exit 1
          fi
          for field in name version slug ingress; do
            if ! grep -q "^${field}:" config.yaml; then
              echo "❌ Missing required field: ${field}"
              exit 1
            fi
          done
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"//' | sed 's/"//')
          echo "✓ config.yaml valid — version: $VERSION"

      # ── 2. Validate Dockerfile ──────────────────────────────────
      - name: Validate Dockerfile exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "❌ Dockerfile not found"
            exit 1
          fi
          echo "✓ Dockerfile present"

      # ── 3. Validate required app files ─────────────────────────
      - name: Check required app structure
        run: |
          echo "Checking app structure..."
          REQUIRED=(
            "app/server.py"
            "app/assets/css/main.css"
            "app/assets/js/main.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
            echo "✓ $f"
          done

      # ── 4. Validate HTML pages ──────────────────────────────────
      - name: Check HTML pages exist and are non-empty
        run: |
          echo "Checking HTML pages..."
          PAGE_COUNT=0
          for f in app/pages/*.html; do
            if [ ! -s "$f" ]; then
              echo "❌ Empty or missing page: $f"
              exit 1
            fi
            SIZE=$(wc -c < "$f")
            echo "✓ $(basename $f) — ${SIZE} bytes"
            PAGE_COUNT=$((PAGE_COUNT + 1))
          done
          echo "Total pages: $PAGE_COUNT"
          if [ $PAGE_COUNT -lt 1 ]; then
            echo "❌ No HTML pages found in app/pages/"
            exit 1
          fi

      # ── 5. Python syntax check ──────────────────────────────────
      - name: Python syntax check — server.py
        run: |
          python3 -m py_compile app/server.py
          echo "✓ server.py — syntax OK"

      # ── 6. Check for accidental credential leaks ────────────────
      - name: Scan for accidental credential exposure
        run: |
          echo "Scanning for credentials..."
          FOUND=0

          # Check for hardcoded IPs (real ones, not examples)
          if grep -rn '192\.168\.[0-9]\+\.[0-9]\+' app/ --include="*.html" --include="*.js" 2>/dev/null | grep -v '192\.168\.1\.x\|192\.168\.x\.x\|example'; then
            echo "⚠ Warning: possible hardcoded IP found"
            FOUND=1
          fi

          # Check for long-lived token patterns
          if grep -rn 'ghp_[A-Za-z0-9]\{36\}\|github_pat_[A-Za-z0-9_]\{82\}' app/ 2>/dev/null; then
            echo "❌ GitHub token found hardcoded in source!"
            exit 1
          fi

          if [ $FOUND -eq 0 ]; then
            echo "✓ No credential leaks detected"
          fi

      # ── 7. Summary ──────────────────────────────────────────────
      - name: CI Summary
        run: |
          echo ""
          echo "════════════════════════════════════"
          echo "  HA Tools Hub — CI PASSED ✅"
          echo "════════════════════════════════════"
          echo "  Version: $(grep '^version:' config.yaml | sed 's/version: *"//' | sed 's/"//')"
          echo "  Pages:   $(ls app/pages/*.html 2>/dev/null | wc -l)"
          echo "  Commit:  ${{ github.sha }}"
          echo "════════════════════════════════════"
