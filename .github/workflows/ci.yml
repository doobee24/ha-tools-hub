# ════════════════════════════════════════════════════════════════
#  HA Tools Hub — CI Workflow
#  Runs on every push and pull request to main.
# ════════════════════════════════════════════════════════════════

name: CI — Addon Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Addon Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Debug - show working directory
        run: |
          echo "Working directory: $(pwd)"
          echo "Files at root:"
          ls -la
          echo ""
          echo "app/ contents:"
          ls -la app/ || echo "No app/ folder found"

      - name: Validate config.yaml
        run: |
          if [ ! -f config.yaml ]; then
            echo "❌ config.yaml not found at $(pwd)"
            ls -la
            exit 1
          fi
          for field in name version slug ingress; do
            if ! grep -q "^${field}:" config.yaml; then
              echo "❌ Missing required field: ${field}"
              exit 1
            fi
          done
          VERSION=$(grep '^version:' config.yaml | sed 's/version: *"//' | sed 's/"//')
          echo "✓ config.yaml valid — version: $VERSION"

      - name: Validate Dockerfile
        run: |
          if [ ! -f Dockerfile ]; then
            echo "❌ Dockerfile not found"
            exit 1
          fi
          echo "✓ Dockerfile present"

      - name: Check required app structure
        run: |
          REQUIRED=("app/server.py" "app/assets/css/main.css" "app/assets/js/main.js")
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            fi
            echo "✓ $f"
          done

      - name: Check HTML pages
        run: |
          PAGE_COUNT=0
          for f in app/pages/*.html; do
            [ -e "$f" ] || { echo "❌ No HTML pages found in app/pages/"; exit 1; }
            [ -s "$f" ] || { echo "❌ Empty page: $f"; exit 1; }
            echo "✓ $(basename $f) — $(wc -c < $f) bytes"
            PAGE_COUNT=$((PAGE_COUNT + 1))
          done
          echo "Total pages: $PAGE_COUNT"

      - name: Python syntax check
        run: |
          python3 -m py_compile app/server.py
          echo "✓ server.py syntax OK"

      - name: Credential scan
        run: |
          if grep -rn 'ghp_[A-Za-z0-9]\{36\}\|github_pat_[A-Za-z0-9_]\{82\}' app/ 2>/dev/null; then
            echo "❌ GitHub token hardcoded in source!"
            exit 1
          fi
          echo "✓ No credential leaks"

      - name: Summary
        run: |
          echo "════════════════════════════════════"
          echo "  HA Tools Hub — CI PASSED ✅"
          echo "  Version: $(grep '^version:' config.yaml | sed 's/version: *"//' | sed 's/\"//')"
          echo "  Pages:   $(ls app/pages/*.html 2>/dev/null | wc -l)"
          echo "  Commit:  ${{ github.sha }}"
          echo "════════════════════════════════════"