# ================================================================
#  HA Dashboard Verify — config.yaml
#  Standalone Lovelace dashboard and card inventory viewer.
#  Lists all dashboards, views, and card types via HA WebSocket API.
# ================================================================
name: "HA Dashboard Verify"
description: "HA Tools Hub — Lovelace dashboard and card inventory viewer."
version: "1.0.0"
slug: "ha_dashboard_verify"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: manual
ingress: true
ingress_port: 8097
panel_icon: mdi:view-dashboard-outline
panel_title: "Dashboard Verify"
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
